   <style>
     .register-container {
       min-height: 100vh;
       display: flex;
       align-items: center;
       justify-content: center;
       background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
       padding: 40px 20px;
     }
     .register-box {
       background: white;
       border-radius: 12px;
       padding: 50px;
       box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
       width: 100%;
       max-width: 500px;
     }
     .register-box h2 {
       text-align: center;
       margin-bottom: 10px;
       color: #1a1a1a;
       font-weight: bold;
       font-size: 28px;
     }
     .register-box p {
       text-align: center;
       color: #666;
       margin-bottom: 30px;
       font-size: 14px;
     }
     .form-group {
       margin-bottom: 18px;
     }
     .form-row {
       display: grid;
       grid-template-columns: 1fr 1fr;
       gap: 15px;
     }
     .form-group label {
       display: block;
       margin-bottom: 8px;
       color: #333;
       font-weight: 600;
       font-size: 14px;
     }
     .form-group input,
     .form-group select {
       width: 100%;
       padding: 12px 15px;
       border: 1px solid #ddd;
       border-radius: 6px;
       font-size: 14px;
       transition: border-color 0.3s ease;
       font-family: inherit;
     }
     .form-group input:focus,
     .form-group select:focus {
       outline: none;
       border-color: #FFB400;
       box-shadow: 0 0 0 3px rgba(255, 180, 0, 0.1);
     }
     .form-group textarea {
       width: 100%;
       padding: 12px 15px;
       border: 1px solid #ddd;
       border-radius: 6px;
       font-size: 14px;
       transition: border-color 0.3s ease;
       font-family: inherit;
       resize: vertical;
       min-height: 80px;
     }
     .form-group textarea:focus {
       outline: none;
       border-color: #FFB400;
       box-shadow: 0 0 0 3px rgba(255, 180, 0, 0.1);
     }
     .terms {
       display: flex;
       align-items: flex-start;
       margin-bottom: 25px;
       font-size: 13px;
       gap: 8px;
     }
     .terms input[type="checkbox"] {
       margin-top: 4px;
       cursor: pointer;
     }
     .terms a {
       color: #FFB400;
       text-decoration: none;
       transition: color 0.3s ease;
     }
     .terms a:hover {
       color: #ff9500;
     }
     .register-btn {
       width: 100%;
       padding: 14px;
       background: linear-gradient(135deg, #FFB400 0%, #FF9500 100%);
       color: #1a1a1a;
       border: none;
       border-radius: 6px;
       font-weight: 600;
       font-size: 16px;
       cursor: pointer;
       transition: transform 0.3s ease, box-shadow 0.3s ease;
     }
     .register-btn:hover {
       transform: translateY(-2px);
       box-shadow: 0 10px 25px rgba(255, 180, 0, 0.3);
     }
     .login-link {
       text-align: center;
       margin-top: 20px;
       font-size: 14px;
       color: #666;
     }
     .login-link a {
       color: #FFB400;
       text-decoration: none;
       font-weight: 600;
       transition: color 0.3s ease;
     }
     .login-link a:hover {
       color: #ff9500;
     }
     .divider {
       display: flex;
       align-items: center;
       margin: 25px 0;
       color: #999;
       font-size: 13px;
     }
     .divider::before,
     .divider::after {
       content: '';
       flex: 1;
       height: 1px;
       background: #ddd;
     }
     .divider span {
       margin: 0 15px;
     }
     .social-signup {
       display: flex;
       gap: 12px;
       margin-top: 20px;
     }
     .social-btn {
       flex: 1;
       padding: 12px;
       border: 1px solid #ddd;
       background: white;
       border-radius: 6px;
       cursor: pointer;
       transition: all 0.3s ease;
       display: flex;
       align-items: center;
       justify-content: center;
       gap: 8px;
       font-size: 13px;
       font-weight: 500;
       color: #333;
     }
     .social-btn:hover {
       border-color: #FFB400;
       background: rgba(255, 180, 0, 0.05);
     }
   </style>
 </head>

<!-- Registration Section -->
<section class="register-container">
  <div class="register-box">
    <h2>Create Account</h2>
    <p>Join thousands of investors and start growing your wealth</p>
    
    <form method="POST" action="dashboard.html">
      <div class="form-row">
        <div class="form-group">
          <label for="firstname">First Name</label>
          <input type="text" id="firstname" name="firstname" placeholder="John" required>
        </div>
        <div class="form-group">
          <label for="lastname">Last Name</label>
          <input type="text" id="lastname" name="lastname" placeholder="Doe" required>
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>
      </div>

      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" placeholder="+1 (555) 000-0000" required>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="country">Country</label>
          <select id="country" name="country" required>
            <option value="">Select Country</option>
            <option value="usa">United States</option>
            <option value="canada">Canada</option>
            <option value="uk">United Kingdom</option>
            <option value="australia">Australia</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label for="investment">Initial Investment</label>
          <select id="investment" name="investment" required>
            <option value="">Select Amount</option>
            <option value="1000">$1,000 - $9,999</option>
            <option value="10000">$10,000 - $99,999</option>
            <option value="100000">$100,000+</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Create a strong password" required>
      </div>

      <div class="form-group">
        <label for="confirm">Confirm Password</label>
        <input type="password" id="confirm" name="confirm" placeholder="Re-enter your password" required>
      </div>

      <div class="terms">
        <input type="checkbox" id="terms" name="terms" required>
        <label for="terms" style="margin: 0;">I agree to the <a href="#">Terms & Conditions</a> and <a href="#">Privacy Policy</a></label>
      </div>

      <button type="submit" class="register-btn">Create Account</button>
    </form>

    <div class="divider">
      <span>or sign up with</span>
    </div>

    <div class="social-signup">
      <button class="social-btn">
        <img src="assets/img/google-color.png" alt="Google" style="width: 18px; height: 18px;">
        Google
      </button>
      <button class="social-btn">
        <i class="fab fa-facebook-f"></i> Facebook
      </button>
    </div>

    <div class="login-link">
      Already have an account? <a href="login.html">Sign in here</a>
    </div>
  </div>
</section>
