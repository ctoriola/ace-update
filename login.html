   <style>
     .login-container {
       min-height: 100vh;
       display: flex;
       align-items: center;
       justify-content: center;
       background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
       padding: 40px 20px;
     }
     .login-box {
       background: white;
       border-radius: 12px;
       padding: 50px;
       box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
       width: 100%;
       max-width: 450px;
     }
     .login-box h2 {
       text-align: center;
       margin-bottom: 10px;
       color: #1a1a1a;
       font-weight: bold;
       font-size: 28px;
     }
     .login-box p {
       text-align: center;
       color: #666;
       margin-bottom: 30px;
       font-size: 14px;
     }
     .form-group {
       margin-bottom: 20px;
     }
     .form-group label {
       display: block;
       margin-bottom: 8px;
       color: #333;
       font-weight: 600;
       font-size: 14px;
     }
     .form-group input {
       width: 100%;
       padding: 12px 15px;
       border: 1px solid #ddd;
       border-radius: 6px;
       font-size: 14px;
       transition: border-color 0.3s ease;
     }
     .form-group input:focus {
       outline: none;
       border-color: #FFB400;
       box-shadow: 0 0 0 3px rgba(255, 180, 0, 0.1);
     }
     .remember-forgot {
       display: flex;
       justify-content: space-between;
       align-items: center;
       margin-bottom: 25px;
       font-size: 13px;
     }
     .remember-forgot input[type="checkbox"] {
       margin-right: 6px;
     }
     .remember-forgot a {
       color: #FFB400;
       text-decoration: none;
       transition: color 0.3s ease;
     }
     .remember-forgot a:hover {
       color: #ff9500;
     }
     .login-btn {
       width: 100%;
       padding: 14px;
       background: linear-gradient(135deg, #FFB400 0%, #FF9500 100%);
       color: #1a1a1a;
       border: none;
       border-radius: 6px;
       font-weight: 600;
       font-size: 16px;
       cursor: pointer;
       transition: transform 0.3s ease, box-shadow 0.3s ease;
     }
     .login-btn:hover {
       transform: translateY(-2px);
       box-shadow: 0 10px 25px rgba(255, 180, 0, 0.3);
     }
     .signup-link {
       text-align: center;
       margin-top: 20px;
       font-size: 14px;
       color: #666;
     }
     .signup-link a {
       color: #FFB400;
       text-decoration: none;
       font-weight: 600;
       transition: color 0.3s ease;
     }
     .signup-link a:hover {
       color: #ff9500;
     }
     .divider {
       display: flex;
       align-items: center;
       margin: 25px 0;
       color: #999;
       font-size: 13px;
     }
     .divider::before,
     .divider::after {
       content: '';
       flex: 1;
       height: 1px;
       background: #ddd;
     }
     .divider span {
       margin: 0 15px;
     }
     .social-login {
       display: flex;
       gap: 12px;
       margin-top: 20px;
     }
     .social-btn {
       flex: 1;
       padding: 12px;
       border: 1px solid #ddd;
       background: white;
       border-radius: 6px;
       cursor: pointer;
       transition: all 0.3s ease;
       display: flex;
       align-items: center;
       justify-content: center;
       gap: 8px;
       font-size: 13px;
       font-weight: 500;
       color: #333;
     }
     .social-btn:hover {
       border-color: #FFB400;
       background: rgba(255, 180, 0, 0.05);
     }
   </style>

<!-- Login Section -->
<section class="login-container">
  <div class="login-box">
    <h2>Welcome Back</h2>
    <p>Access your investment portfolio and manage your accounts</p>
    
    <form method="POST" action="dashboard.html">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required>
      </div>

      <div class="remember-forgot">
        <label>
          <input type="checkbox" name="remember"> Remember me
        </label>
        <a href="#">Forgot Password?</a>
      </div>

      <button type="submit" class="login-btn">Sign In</button>
    </form>

    <div class="divider">
      <span>or</span>
    </div>

    <div class="social-login">
      <button class="social-btn">
        <img src="assets/img/google-color.png" alt="Google" style="width: 18px; height: 18px;">
        Google
      </button>
      <button class="social-btn">
        <i class="fab fa-facebook-f"></i> Facebook
      </button>
    </div>

    <div class="signup-link">
      Don't have an account? <a href="register.html">Create one here</a>
    </div>
  </div>
</section>
